version: "3.8"

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///app/data/app.db
      - STORAGE_PATH=/app/data/storage
      - WORKER_THREADS=4
      - CUDA_VISIBLE_DEVICES=0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
