version: "3.8"

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///app/data/app.db
      - STORAGE_PATH=/app/data/storage
      - WORKER_THREADS=4
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
